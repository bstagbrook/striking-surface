// Build lookup tables on load
const fwd = new Map();  // key → value (first match)
const atoms = new Set();

for (const p of PAIRS) {
  if (!p) continue;
  const [k, v] = p;
  if (!fwd.has(k)) fwd.set(k, v);
  atoms.add(k);
  atoms.add(v);
}

const log = document.getElementById('log');
const input = document.getElementById('q');

log.querySelector('.meta').textContent = `  ${fwd.size} pairs. ${atoms.size} atoms.\n  type. the body speaks.\n\n`;

const STOP = new Set('a an the is are was were be been being have has had do does did will would shall should may might can could what how why when where who which that this these those of in on at to for with by from and or but not no it its i me my you your we our they them their'.split(' '));

function stem(w) {
  return w.replace(/ies$/, 'y').replace(/s$/, '').replace(/ing$/, '').replace(/ed$/, '').replace(/tion$/, 't').replace(/ly$/, '');
}

function query(q) {
  const words = q.toLowerCase().replace(/[^a-z]/g, ' ').split(/\s+/).filter(w => w && !STOP.has(w));
  const candidates = [...new Set([...words, ...words.map(stem).filter(s => s)])];

  // Find matching atoms
  const matched = new Set();
  const atomList = [...atoms];
  for (const word of candidates) {
    for (const atom of atomList) {
      if (atom.toLowerCase().includes(word) && matched.size < 20) {
        matched.add(atom);
      }
    }
  }

  if (matched.size === 0) return ['CUT'];

  // Trace from each matched atom
  const traces = [];
  const seen = new Set();
  for (const atom of matched) {
    let current = atom;
    const chain = [current];
    let depth = 0;
    while (depth < 5) {
      const next = fwd.get(current);
      if (!next) break;
      const edge = current + '>' + next;
      if (seen.has(edge)) break;
      seen.add(edge);
      chain.push(next);
      current = next;
      depth++;
    }
    if (chain.length > 2) traces.push(chain.join(' → '));
  }

  return traces.length > 0 ? traces.slice(0, 8) : ['CUT'];
}

input.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const q = input.value.trim();
  if (!q) return;
  input.value = '';

  const youLine = document.createElement('div');
  youLine.className = 'you';
  youLine.textContent = `  you: ${q}`;
  log.appendChild(youLine);

  const results = query(q);
  const blank = document.createElement('div');
  blank.textContent = '';
  log.appendChild(blank);

  for (const r of results) {
    const line = document.createElement('div');
    line.className = r === 'CUT' ? 'cut' : 'trace';
    line.textContent = `  ${r}`;
    log.appendChild(line);
  }

  const blank2 = document.createElement('div');
  blank2.textContent = '';
  log.appendChild(blank2);

  log.scrollTop = log.scrollHeight;
});
